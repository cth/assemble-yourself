name: Deploy web game to GitHub Pages

# Publishes the static game in docs/ to the `gh-pages` branch, which the
# repository serves via Pages ("Deploy from a branch" -> gh-pages). Runs on
# every push to the default branch that touches the site, and on demand.

on:
  push:
    branches: [master, main]
    paths: [docs/**, .github/workflows/pages.yml]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish docs/ to the gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          site="$(mktemp -d)"
          cp -R docs/. "$site/"
          touch "$site/.nojekyll"
          cd "$site"
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -q -b gh-pages
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA} to Pages"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
