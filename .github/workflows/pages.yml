name: Deploy web game to GitHub Pages

# Publishes the static game in docs/ to GitHub Pages on every push to the
# default branch. In the repository settings, set Pages -> Build and deployment
# -> Source to "GitHub Actions" for this workflow to take effect.

on:
  push:
    branches: [master, main]
    paths: [docs/**, .github/workflows/pages.yml]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
